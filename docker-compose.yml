services:
  live-monitor-app:
    build:
      context: .
      target: live_monitor_app
    image: live-monitor-app:latest
    container_name: live-monitor-app
    privileged: true
    pid: host
    network_mode: host
    environment:
      NETSENTINEL_REPO_ROOT: /opt/netsentinel
      NETSENTINEL_DATA_DIR: /opt/netsentinel/data
      NETSENTINEL_APP_CACHE_DIR: /opt/netsentinel/data/app
      NETSENTINEL_DISABLE_EXTERNAL_FONTS: "true"
      NETSENTINEL_GENERATE_MOCK_LIVE_RUN: "false"
      NETSENTINEL_AUTOSTART_LIVE_CAPTURE: "true"
      PORT: "8501"
    volumes:
      - ./data:/opt/netsentinel/data
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
    restart: unless-stopped
