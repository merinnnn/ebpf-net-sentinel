services:
  netsentinel:
    build:
      context: .
      target: app
    image: netsentinel:app
    container_name: netsentinel-app
    ports:
      - "8501:8501"
    environment:
      NETSENTINEL_REPO_ROOT: /opt/netsentinel
      NETSENTINEL_DATA_DIR: /opt/netsentinel/data
      NETSENTINEL_APP_CACHE_DIR: /opt/netsentinel/data/app
      NETSENTINEL_DISABLE_EXTERNAL_FONTS: "true"
      NETSENTINEL_BUILD_SNAPSHOTS_ON_BOOTSTRAP: "true"
      NETSENTINEL_GENERATE_MOCK_LIVE_RUN: "false"
      NETSENTINEL_USE_SNAPSHOT_CACHE: "true"
    volumes:
      - ./data:/opt/netsentinel/data
    restart: unless-stopped

  netsentinel-live:
    build:
      context: .
      target: live
    image: netsentinel:live
    container_name: netsentinel-live
    network_mode: host
    privileged: true
    pid: host
    environment:
      NETSENTINEL_REPO_ROOT: /opt/netsentinel
      NETSENTINEL_DATA_DIR: /opt/netsentinel/data
      NETSENTINEL_APP_CACHE_DIR: /opt/netsentinel/data/app
      NETSENTINEL_DISABLE_EXTERNAL_FONTS: "true"
      NETSENTINEL_BUILD_SNAPSHOTS_ON_BOOTSTRAP: "true"
      NETSENTINEL_GENERATE_MOCK_LIVE_RUN: "false"
      NETSENTINEL_USE_SNAPSHOT_CACHE: "true"
      NETSENTINEL_PREBUILD_NETMON: "1"
      PORT: "8501"
    volumes:
      - ./data:/opt/netsentinel/data
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
    restart: unless-stopped
